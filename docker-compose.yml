services:
  caddy:
    image: caddy:2-alpine
    container_name: leaderprism_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - FQDN=${FQDN}
    depends_on:
      - api
      - web

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: leaderprism_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS}
      - PORT=3001
      - NODE_ENV=production
      - WEB_URL=https://${FQDN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${FQDN}/api/v1
    container_name: leaderprism_web
    restart: unless-stopped
    environment:
      - INTERNAL_API_URL=http://api:3001
      - NEXT_PUBLIC_API_URL=https://${FQDN}/api/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    container_name: leaderprism_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: leaderprism
      POSTGRES_PASSWORD: leaderprism_dev
      POSTGRES_DB: leaderprism
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leaderprism"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: leaderprism_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
