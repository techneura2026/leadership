name: Deploy Landing Site

on:
  push:
    branches: [master]
    paths:
      - 'landing/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: 'Build and Deploy to Azure Static Web Apps'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build landing site (static export)
        env:
          NEXT_PUBLIC_APP_URL: https://leaderprism-dev-app.centralus.cloudapp.azure.com
        run: npm run build -w landing

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LANDING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'landing'
          output_location: 'out'
          skip_app_build: true

