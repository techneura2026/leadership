name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [staging]

jobs:
  test-api:
    name: API — Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leaderprism
          POSTGRES_PASSWORD: test
          POSTGRES_DB: leaderprism_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci --workspace=api --workspace=shared --include-workspace-root
      - run: npm run lint -w api
      - run: npm run test -w api
        env:
          DATABASE_URL: postgresql://leaderprism:test@localhost:5432/leaderprism_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-access-secret-min-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          JWT_REFRESH_SECRET: test-refresh-secret-min-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 30d
          BCRYPT_ROUNDS: 4
          NODE_ENV: test

  test-web:
    name: Web — Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci --workspace=web --workspace=shared --include-workspace-root
      - run: npm run lint -w web
      - run: npm run typecheck -w web
      - run: npm run build -w shared && npm run build -w web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
