name: Deploy to Dev VM

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: 'Deploy Apps'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared and api
        run: |
          npm run build -w shared
          npm run build -w api

      - name: Build web
        env:
          NEXT_PUBLIC_API_URL: https://leaderprism-dev-app.centralus.cloudapp.azure.com/api/v1
          INTERNAL_API_URL: http://api:3001
        run: npm run build -w web

      - name: Create package tarball
        run: |
          # Create a deployment package excluding unneeded source files and large dev node_modules
          tar -czf deploy.tar.gz api/dist web/.next shared/dist package.json package-lock.json docker-compose.yml api/package.json web/package.json shared/package.json api/src/database/seeds api/src/database/init.sql api/Dockerfile web/Dockerfile Caddyfile

      - name: Copy files to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEV_VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/home/ubuntu/app"

      - name: Deploy and start application on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create target folder and extract
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            # Write environment variables
            cat <<EOT > .env
            DATABASE_URL=postgresql://leaderprism:leaderprism_dev@db:5432/leaderprism?sslmode=disable
            REDIS_URL=redis://redis:6379
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_ACCESS_EXPIRY=15m
            JWT_REFRESH_EXPIRY=30d
            BCRYPT_ROUNDS=10
            PORT=3001
            NODE_ENV=production
            FQDN=leaderprism-dev-app.centralus.cloudapp.azure.com
            EOT
            
            # Stop existing PM2 processes if any
            pm2 delete all || true
            pm2 save || true
            
            # Start everything via Docker Compose
            docker compose up --build -d
            
            # Wait for DB to be healthy
            echo "Waiting for database to be ready..."
            until docker compose exec -T db pg_isready -U leaderprism; do
              sleep 1
            done
            
            # Wait for API to be up before running migrations (it usually connects to DB)
            sleep 5
            
            # Run database migrations
            docker compose exec -T api npx typeorm migration:run -d api/dist/api/src/database/data-source.js

            # Run database seeds
            docker compose exec -T api node api/dist/api/src/database/seeds/run-seeds.js
