name: Deploy to Dev VM

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: 'Deploy Apps'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared and api
        run: |
          npm run build -w shared
          npm run build -w api

      - name: Build web
        run: npm run build -w web

      - name: Create package tarball
        run: |
          # Create a deployment package excluding unneeded source files and large dev node_modules
          tar -czf deploy.tar.gz api/dist web/.next shared/dist package.json package-lock.json docker-compose.yml api/package.json web/package.json shared/package.json api/src/database/seeds api/src/database/init.sql

      - name: Copy files to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEV_VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/home/ubuntu/app"

      - name: Deploy and start application on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create target folder and extract
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            # Write environment variables
            cat <<EOT > .env
            DATABASE_URL=postgresql://leaderprism:leaderprism_dev@localhost:5432/leaderprism?sslmode=disable
            REDIS_URL=redis://localhost:6379
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_ACCESS_EXPIRY=15m
            JWT_REFRESH_EXPIRY=30d
            BCRYPT_ROUNDS=10
            PORT=3001
            NODE_ENV=production
            EOT
            
            # Start database and redis in Docker
            docker compose up -d
            
            # Wait for DB to be healthy
            echo "Waiting for database to be ready..."
            until docker exec leaderprism_db pg_isready -U leaderprism; do
              sleep 1
            done
            
            # Install production dependencies on the host VM
            npm ci --omit=dev
            
            # Run database seeds
            npm run seed -w api
            
            # Start NestJS API and NextJS Web Frontend using PM2
            pm2 delete all || true
            pm2 start api/dist/api/src/main.js --name "api" --update-env
            pm2 start npm --name "web" -- run start -w web
            pm2 save
